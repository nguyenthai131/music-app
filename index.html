<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/vendors/Normalize_CSS/normalize.css">
    <link rel="stylesheet" href="./assets/css/vendors/font awesome/css/all.css">
    <link rel="stylesheet" href="./assets/css/style/style.css">


</head>

<body>

    <div class="wrapper">

        <div class="app">

            <div class="app__top">

                <div class="app__playing-thumb-box">

                    <div class="app__playing-photo"></div>

                </div>

                <div class="app__heading-box">
                    <h3 class="app__playing-name"></h3>

                    <p class="app__playing-artist"></p>
                </div>

                <input type="range" step="1" min="0" max="100" start="0" value="0" class="app__time-bar">

                <audio src="" class="app__playing-song"></audio>


                <div class="app__playing-button">

                    <i class="fa-solid fa-repeat btn btn--function app__repeat"></i>

                    <i class="fa-solid fa-backward btn btn--function app__previous"></i>

                    <button class="btn btn--play">
                        <i class="fa-solid fa-play"></i>
                    </button>

                    <i class="fa-solid fa-forward btn btn--function app__forward"></i>

                    <i class="fa-solid fa-shuffle btn btn--function app__random"></i>

                </div>

            </div>

            <div class="app__bottom">

                <div class="app__line">
                </div>

                <div class="app__list-box">

                    <ul class="app__list-songs">
                    </ul>

                </div>

            </div>

        </div>

    </div>

    <script src="assets/script/app.js"></script>

</body>

</html>
